---
- name: Configuration of Interfaces and VLANs
  hosts: mikrotik
  gather_facts: false
  module_defaults:
    group/community.routeros.api:
      hostname: "{{ ansible_host }}"
      username: "{{ ansible_user }}"
      password: "{{ ansible_password }}"
      port: "{{ ansible_port }}"

  tasks:
    - name: Configure P2P IP address on ether2
      community.routeros.api_modify:
        path: ip address
        restrict:
          - field: interface
            values: [ether2]
        data:
          - address: "{{ p2p_address }}"
            interface: ether2
            comment: "P2P Link to neighbor"

    - name: Create VLANs on ether2
      community.routeros.api_modify:
        path: interface vlan
        restrict:
          - field: interface
            values: [ether2]
        data: "{{ vlans }}"
...
